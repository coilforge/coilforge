<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" width="512" height="256">
  <!-- Stem from endpoint (256,256) up to bottom capacitor bar -->
  <line x1="256" y1="256" x2="256" y2="208" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <!-- Bottom capacitor bar -->
  <line x1="186" y1="208" x2="326" y2="208" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <!-- Top: square replacing top bar (same width and height as bar) -->
  <rect x="186" y="36" width="140" height="140" fill="none" stroke="#000" stroke-width="10" rx="4"/>
  <!-- Letter H inside square -->
  <line x1="220" y1="66" x2="220" y2="146" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <line x1="292" y1="66" x2="292" y2="146" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <line x1="220" y1="106" x2="292" y2="106" stroke="#000" stroke-width="10" stroke-linecap="round"/>
</svg>
