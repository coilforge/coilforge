<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" width="512" height="256">
  <!-- Wire left: endpoint#1 to triangle -->
  <line x1="0" y1="128" x2="192" y2="128" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <!-- Wire right: bar to endpoint#2 -->
  <line x1="320" y1="128" x2="512" y2="128" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <!-- Diode triangle (pointing right) -->
  <polygon points="192,72 320,128 192,184" fill="none" stroke="#000" stroke-width="10" stroke-linejoin="round"/>
  <!-- Diode bar (cathode) -->
  <line x1="320" y1="72" x2="320" y2="184" stroke="#000" stroke-width="10" stroke-linecap="round"/>
</svg>
