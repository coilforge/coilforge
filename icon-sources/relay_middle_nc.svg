<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" width="512" height="256">
  <!-- Outline: left and right edges only (top and bottom open for stacking) -->
  <line x1="5" y1="0" x2="5" y2="256" stroke="#000" stroke-width="5"/>
  <line x1="507" y1="0" x2="507" y2="256" stroke="#000" stroke-width="5"/>
  <!-- Common wire: left endpoint at bottom to corner of L -->
  <line x1="0" y1="256" x2="128" y2="256" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <!-- Common stem: vertical up (mirrored L) -->
  <line x1="128" y1="256" x2="128" y2="226" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <!-- Pivot dot -->
  <circle cx="128" cy="226" r="6" fill="#000"/>
  <!-- NC wire: right endpoint at bottom to corner of L -->
  <line x1="512" y1="256" x2="350" y2="256" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <!-- NC stem: vertical up (L-shape) -->
  <line x1="350" y1="256" x2="350" y2="226" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <!-- NC arrowhead (pointing up) -->
  <polyline points="340,238 350,226 360,238" fill="none" stroke="#000" stroke-width="3.75" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- NO wire: right endpoint at 50% to stem -->
  <line x1="512" y1="128" x2="350" y2="128" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <!-- NO stem (downward toward center) -->
  <line x1="350" y1="128" x2="350" y2="158" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <!-- NO arrowhead (pointing down) -->
  <polyline points="340,146 350,158 360,146" fill="none" stroke="#000" stroke-width="3.75" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Armature (NC — horizontal at rest, resting on NC arrowhead) -->
  <line x1="128" y1="226" x2="382" y2="226" stroke="#000" stroke-width="5" stroke-linecap="round"/>
</svg>
