<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" width="512" height="256">
  <!-- Wire left: endpoint#1 to left contact -->
  <line x1="0" y1="128" x2="128" y2="128" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <!-- Wire right: right contact to endpoint#2 -->
  <line x1="343" y1="128" x2="512" y2="128" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <!-- Left contact (pivot) -->
  <circle cx="128" cy="128" r="12" fill="#000"/>
  <!-- Right contact: upward stem with arrowhead -->
  <line x1="343" y1="128" x2="343" y2="88" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <polyline points="333,100 343,88 353,100" fill="none" stroke="#000" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arm (open position — angled up, clearly away from arrowhead) -->
  <line x1="128" y1="128" x2="350" y2="46" stroke="#000" stroke-width="10" stroke-linecap="round"/>
</svg>
