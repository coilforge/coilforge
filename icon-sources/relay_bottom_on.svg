  <!-- Top edge wires to match alt middle COM and NC at bottom -->
  <line x1="0" y1="0" x2="128" y2="0" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <line x1="512" y1="0" x2="350" y2="0" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <!-- Left stem from endpoint up -->
  <line x1="128" y1="128" x2="128" y2="80" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <!-- Right stem from endpoint up -->
  <line x1="384" y1="128" x2="384" y2="80" stroke="#000" stroke-width="5" stroke-linecap="round"/>
  <!-- Relay coil energised (half-circle bumps, stroke colored) -->
