<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Left wire -->
  <line x1="8" y1="112" x2="52" y2="112" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <!-- Right wire -->
  <line x1="148" y1="112" x2="184" y2="112" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <!-- Left pivot dot -->
  <circle cx="52" cy="112" r="10" fill="#000"/>
  <!-- Right contact: upward stem with arrowhead -->
  <line x1="148" y1="112" x2="148" y2="80" stroke="#000" stroke-width="10" stroke-linecap="round"/>
  <polyline points="139,90 148,80 157,90" fill="none" stroke="#000" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arm (open — angled up, not touching arrowhead) -->
  <line x1="52" y1="112" x2="142" y2="48" stroke="#000" stroke-width="10" stroke-linecap="round"/>
</svg>
