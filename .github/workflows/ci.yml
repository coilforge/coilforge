name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Download Go modules
        run: go mod download

      - name: Install native Linux dependencies (Ebiten / GLFW / X11)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev \
            libxinerama-dev \
            libxxf86vm-dev \
            libgl1-mesa-dev

      - name: Install local check tools
        run: ./check.sh bootstrap

      - name: Run checks
        run: ./check.sh full

